name: Deploy Docs Hub to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Automatically runs every day at midnight UTC to get new docs
  workflow_dispatch: # Allows you to manually trigger the update from the GitHub Actions tab

permissions:
  contents: write # Needed to commit updated markdown back to repo
  pages: write    # Needed to deploy to Pages
  id-token: write # Needed for OIDC authentication with Pages

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-name: '3.11'

      - name: Install Scraper Dependencies
        run: |
          pip install beautifulsoup4

      - name: Scrape Latest Kiro Docs
        run: |
          python update_docs.py

      - name: Commit Scraped Content Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kiro_docs.md metadata.json
          # Check if there are changes to commit, ignore error if nothing changed
          git diff-index --quiet HEAD || git commit -m "chore: auto-update scraped Kiro documentation"
          git push || echo "No changes or failed to push"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Deploy all static assets in the root folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
...
